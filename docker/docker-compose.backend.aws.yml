services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DEBUG=False
    volumes:
      - ../vector_db:/app/vector_db:ro
      - ../data:/app/data:ro
    restart: unless-stopped
    command:
      [
        "gunicorn",
        "backend.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "2",
        "--threads",
        "2",
        "--timeout",
        "600"
      ]
