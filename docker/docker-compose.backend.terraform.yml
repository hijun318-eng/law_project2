services:
  # Terraform으로 새로 만든 서버 전용. 기존 운영 서버용 docker-compose.backend.aws.yml은
  # 52.79.204.190 IP/도메인이 environment에 하드코딩되어 있어 그대로 재사용하면 새
  # 서버에서 DisallowedHost가 나거나(ALLOWED_HOSTS 불일치), nginx가 존재하지 않는
  # SSL 인증서 경로 때문에 아예 못 뜬다. 그래서 하드코딩을 걷어내고 nginx도
  # HTTP 전용(nginx.terraform.conf)으로 분리했다 — ALLOWED_HOSTS/CSRF_TRUSTED_ORIGINS는
  # env_file(../.env)에 있는 값을 그대로 씀.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.terraform.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DEBUG=False
      - RANKER_TIMEOUT_SECONDS=30
    volumes:
      - ../apps/backend:/app/apps/backend
      - ../vector_db:/app/vector_db
      - ../data:/app/data:ro
      - staticfiles:/app/apps/backend/staticfiles
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "python -m pip install --no-cache-dir dj-database-url 'psycopg[binary]' && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 600 --access-logfile - --error-logfile - --capture-output"
      ]

volumes:
  staticfiles:
