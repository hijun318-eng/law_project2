services:
  ranker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ranker
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=ranker.settings
      - ALLOWED_HOSTS=localhost,127.0.0.1,ranker
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - RANKER_URL=http://ranker:8001
    volumes:
      - ../vector_db:/app/vector_db
      - ../data:/app/data
    depends_on:
      - ranker

volumes:
  huggingface_cache:
