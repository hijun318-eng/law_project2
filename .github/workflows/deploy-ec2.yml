name: Deploy EC2

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy deploy branch to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 10m
          command_timeout: 20m
          script_stop: false
          script: |
            set -e
            cd ~/law_project2
            git fetch origin deploy
            git checkout deploy
            git pull --ff-only origin deploy
            cat > .env <<'EOF'
            ${{ secrets.PROD_ENV }}
            EOF
            python3 - <<'PY'
            from pathlib import Path
            import re

            env_path = Path(".env")
            cleaned = []
            for line in env_path.read_text(encoding="utf-8", errors="replace").splitlines():
                stripped = line.strip()
                if not stripped:
                    cleaned.append("")
                    continue
                if stripped.startswith("#"):
                    cleaned.append(stripped)
                    continue
                if stripped.startswith("DRONE_SSH_PREV_COMMAND_EXIT_CODE="):
                    continue
                if "=" in line:
                    key, value = line.split("=", 1)
                    key = key.strip()
                    if re.match(r"^[A-Za-z_][A-Za-z0-9_]*$", key):
                        cleaned.append(f"{key}={value.lstrip()}")
                        continue
                cleaned.append(line)

            env_path.write_text("\n".join(cleaned).rstrip() + "\n", encoding="utf-8")
            PY
            docker compose --env-file .env -f docker/docker-compose.backend.aws.yml up -d --no-build --force-recreate
            docker compose -f docker/docker-compose.backend.aws.yml ps
            for i in $(seq 1 12); do
              if curl -fsS -o /dev/null -H "Host: ${{ secrets.EC2_HOST }}" http://localhost/; then
                exit 0
              fi
              sleep 5
            done
            docker compose -f docker/docker-compose.backend.aws.yml logs --tail=100 backend
            exit 1
