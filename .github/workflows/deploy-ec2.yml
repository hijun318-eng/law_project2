name: Deploy EC2

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy deploy branch to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd ~/law_project2
            git fetch origin deploy
            git checkout deploy
            git pull --ff-only origin deploy
            if [ -n "${{ secrets.VECTOR_DB_S3_URI }}" ]; then
              if ! command -v aws >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y curl unzip
                cd /tmp
                curl -fsSLo awscliv2.zip https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
                unzip -q -o awscliv2.zip
                sudo ./aws/install --update
                cd ~/law_project2
              fi
              mkdir -p vector_db
              aws s3 sync "${{ secrets.VECTOR_DB_S3_URI }}" vector_db --delete
            fi
            docker compose --env-file .env -f docker/docker-compose.backend.aws.yml up -d --build
            docker compose -f docker/docker-compose.backend.aws.yml ps
