name: Deploy EC2

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy deploy branch to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd ~/law_project2
            git fetch origin deploy
            git checkout deploy
            git pull --ff-only origin deploy
            cat > .env <<'EOF'
            ${{ secrets.PROD_ENV }}
            EOF
            docker compose --env-file .env -f docker/docker-compose.backend.aws.yml up -d --no-build --force-recreate
            docker compose -f docker/docker-compose.backend.aws.yml ps
