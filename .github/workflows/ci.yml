name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: dummy-key-for-ci
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/backend
        run: pip install -r requirements.txt

      - name: Django check
        working-directory: apps/backend
        run: python manage.py check

      - name: Django tests
        working-directory: apps/backend
        run: python manage.py test

  ranker:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/ranker/requirements.txt

      - name: Install ranker dependencies
        working-directory: apps/ranker
        run: pip install -r requirements.txt

      - name: Django check
        working-directory: apps/ranker
        run: python manage.py check

  frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JS syntax
        run: |
          find apps/backend/static -name "*.js" -print0 | xargs -0 -n1 node --check
