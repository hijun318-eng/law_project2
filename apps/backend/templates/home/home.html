<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법률 AI 도우미</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        h1 {
            font-size: 36px;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 12px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: #f8f9ff;
            border: 1px solid #e8e8f0;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        .card-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 14px;
            color: #888;
            line-height: 1.5;
        }
        .footer {
            text-align: center;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ 법률 AI 도우미</h1>
        <p class="subtitle">
            인공지능 기반 법률 서비스를 통해<br>
            보다 쉽고 빠르게 법률 정보를 확인하세요.
        </p>
        <div class="card-grid">
            <a href="{% url 'chat:chat' %}" class="card">
                <div class="card-icon">💬</div>
                <div class="card-title">AI 법률 상담</div>
                <div class="card-desc">법률 질문에 대한 AI 답변을 실시간으로 제공합니다.</div>
            </a>
            <a href="{% url 'calculator:calculator' %}" class="card">
                <div class="card-icon">🧮</div>
                <div class="card-title">법률 계산기</div>
                <div class="card-desc">퇴직금, 근태, 각종 법정 수당을 계산합니다.</div>
            </a>
            <a href="{% url 'news:news_list' %}" class="card">
                <div class="card-icon">📰</div>
                <div class="card-title">최신 법률 뉴스</div>
                <div class="card-desc">법률 관련 최신 뉴스와 판례를 확인합니다.</div>
            </a>
        </div>
        <div class="footer">
            © 2024 법률 AI 도우미. All rights reserved.
        </div>
    </div>
</body>
</html>
