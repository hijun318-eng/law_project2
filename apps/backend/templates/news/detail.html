<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bookmark.title }} - 북마크 상세</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .bookmark-card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; }
        .bookmark-card h1 { margin: 0 0 16px; font-size: 24px; }
        .bookmark-card .meta { color: #999; font-size: 13px; margin-bottom: 16px; }
        .bookmark-card .summary { color: #333; line-height: 1.6; margin-bottom: 20px; }
        .bookmark-card .url { word-break: break-all; }
        .bookmark-card .url a { color: #1a73e8; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #1a73e8; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="{% url 'news_list' %}" class="back-link">&larr; 검색으로 돌아가기</a>
    <div class="bookmark-card">
        <h1>{{ bookmark.title }}</h1>
        <div class="meta">
            {% if bookmark.published_at %}게시일: {{ bookmark.published_at }}<br>{% endif %}
            저장일: {{ bookmark.created_at|date:"Y-m-d H:i" }}
        </div>
        {% if bookmark.summary %}
        <div class="summary">{{ bookmark.summary }}</div>
        {% endif %}
        <div class="url">
            <strong>URL:</strong> <a href="{{ bookmark.url }}" target="_blank">{{ bookmark.url }}</a>
        </div>
    </div>
</body>
</html>
