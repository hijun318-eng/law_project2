<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 검색</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        .search-box button { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .search-box button:hover { background: #1557b0; }
        .result-item { border: 1px solid #eee; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .result-item h3 { margin: 0 0 8px; font-size: 18px; }
        .result-item h3 a { color: #1a73e8; text-decoration: none; }
        .result-item h3 a:hover { text-decoration: underline; }
        .result-item p { margin: 0 0 8px; color: #555; font-size: 14px; line-height: 1.5; }
        .result-item .date { color: #999; font-size: 12px; }
        .error { color: #d93025; padding: 12px; background: #fce8e6; border-radius: 4px; margin-bottom: 12px; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <h1>뉴스 검색</h1>
    <div class="search-box">
        <input type="text" id="keyword" placeholder="검색어를 입력하세요 (예: 최저임금, 근로계약)" />
        <button onclick="searchNews()">검색</button>
    </div>
    <div id="results"></div>

    <script>
        function searchNews() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) return;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">검색 중...</div>';

            fetch('/news/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyword: keyword })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    resultsDiv.innerHTML = '<div class="error">' + data.error + '</div>';
                    return;
                }
                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="error">검색 결과가 없습니다.</div>';
                    return;
                }
                let html = '<h2>검색 결과</h2>';
                data.results.forEach(item => {
                    html += '<div class="result-item">';
                    html += '<h3><a href="' + item.link + '" target="_blank">' + item.title + '</a></h3>';
                    if (item.description) html += '<p>' + item.description + '</p>';
                    if (item.pubDate) html += '<div class="date">' + item.pubDate + '</div>';
                    html += '</div>';
                });
                resultsDiv.innerHTML = html;
            })
            .catch(err => {
                resultsDiv.innerHTML = '<div class="error">검색 중 오류가 발생했습니다.</div>';
            });
        }

        document.getElementById('keyword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchNews();
        });
    </script>
</body>
</html>
