{% extends "labor/base.html" %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<main class="auth-shell">
    <section class="auth-panel">
        <a class="back-link" href="{% url 'login' %}">‹ 로그인으로</a>
        <div class="auth-card">
            <a class="brand" href="{% url 'landing' %}"><span class="brand-mark">§</span><span>노동OK</span></a>
            <h1>회원가입</h1>
            <p>무료로 시작하세요</p>
            <form method="post" class="stack-form">
                {% csrf_token %}
                {% if error %}
                    <p class="form-error">{{ error }}</p>
                {% endif %}
                <label>이름<input type="text" name="name" placeholder="홍길동" value="{{ name|default:'' }}" required></label>
                <label>이메일<input type="email" name="email" placeholder="example@email.com" value="{{ email|default:'' }}" required></label>
                <label>비밀번호<input type="password" name="password" placeholder="8자 이상" minlength="8" required></label>
                <label>비밀번호 확인<input type="password" name="password_confirm" placeholder="비밀번호 확인" minlength="8" required></label>
                <button class="full-button" type="submit">가입하기</button>
            </form>
            <p class="fine-print">가입 시 이용약관 및 개인정보처리방침에 동의합니다.</p>
        </div>
    </section>
</main>
{% endblock %}
