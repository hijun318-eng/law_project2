<section class="admin-page">
    <div class="page-head"><div><h1>피드백 관리</h1><p>답변 품질을 모니터링하고 개선하세요</p></div></div>
    <div class="stat-grid three"><article class="stat-card green"><strong>{{ total_likes }}</strong><p>총 좋아요</p></article><article class="stat-card red"><strong>{{ total_dislikes }}</strong><p>총 싫어요</p></article><article class="stat-card blue"><strong>{{ avg_score }}</strong><p>평균 만족도</p></article></div>
    <div class="tabs" data-feedback-tabs><button class="active" data-feedback-filter="all">전체 답변</button><button data-feedback-filter="low">낮은 평가 ({{ low_count }})</button></div>
    <div class="feedback-list">{% for item in feedbacks %}<article class="feedback-card {% if item.score < 60 %}low{% endif %}" data-feedback-card data-low="{% if item.score < 60 %}true{% else %}false{% endif %}"><header><span>{{ item.category }}</span>{% if item.score < 60 %}<b>개선 필요</b>{% endif %}</header><h2>{{ item.question }}</h2><div class="feedback-meter"><span>좋아요 {{ item.likes }}</span><span>싫어요 {{ item.dislikes }}</span><meter value="{{ item.score }}" min="0" max="100"></meter><strong>{{ item.score }}%</strong></div><textarea placeholder="개선 방향, 수정 내용 등을 메모하세요...">{{ item.memo }}</textarea></article>{% endfor %}</div>
</section>
