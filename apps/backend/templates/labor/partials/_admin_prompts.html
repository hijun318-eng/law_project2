<section class="admin-page" data-prompt-api="{% url 'prompt_api' %}">
    <div class="page-head">
        <div><h1>프롬프트 관리</h1><p>AI 답변 품질에 직접 영향을 미치는 프롬프트 템플릿 관리</p></div>
    </div>
    <div class="prompt-layout">
        <div class="prompt-list" id="promptList">
            {% for t in prompt_templates %}
            <button type="button" class="prompt-list-item {% if forloop.first %}active{% endif %}" data-prompt-id="{{ t.id }}">
                <div class="prompt-list-top"><span>v{{ t.version }}</span><i class="dot-online"></i></div>
                <strong>{{ t.name }}</strong>
                <small>{{ t.description }}</small>
            </button>
            {% endfor %}
        </div>

        <div class="panel prompt-editor">
            <div class="prompt-editor-head">
                <div>
                    <h3 id="promptTitle"></h3>
                    <p id="promptMeta"></p>
                </div>
                <div class="segmented" style="width:auto;" data-prompt-panel-tabs>
                    <button class="active" type="button" data-prompt-panel="editor">편집</button>
                    <button type="button" data-prompt-panel="history">버전 이력</button>
                </div>
            </div>

            <div data-prompt-view="editor">
                <div class="prompt-placeholders" id="promptPlaceholders"></div>
                <textarea id="promptContent" class="prompt-textarea" spellcheck="false"></textarea>
                <div class="notice-box red" id="promptErrors" hidden></div>

                <div class="prompt-save-bar">
                    <span id="promptSaveStatus"></span>
                    <button class="full-button" id="promptSaveBtn" style="width:auto;">저장</button>
                </div>
            </div>

            <div data-prompt-view="history" class="stack-list" id="promptHistory" hidden></div>
        </div>
    </div>

    <div class="prompt-confirm-overlay" id="promptConfirm" hidden>
        <button class="drawer-backdrop" type="button" data-close-confirm></button>
        <div class="drawer-panel" style="max-width:380px; margin:auto; align-self:center;">
            <header><h2>즉시 적용 확인</h2></header>
            <p class="lead">저장 즉시 운영 환경에 반영됩니다. 진행 중인 AI 답변 생성에도 영향을 줍니다.</p>
            <div class="quick-grid">
                <button type="button" class="secondary-button" data-close-confirm>취소</button>
                <button type="button" class="full-button" id="promptConfirmBtn">즉시 적용</button>
            </div>
        </div>
    </div>
</section>
