<section class="content-narrow" data-calc-api="{% url 'calculate_api' %}">
    <h1>수당 계산기</h1>
    <p class="lead">근로 조건을 입력하거나 자연어로 적으면 수당을 자동으로 계산해드립니다</p>
    <div class="segmented">
        <button class="active" type="button" data-calc-mode="form">숫자로 질문</button>
        <button type="button" data-calc-mode="chat">문장으로 질문</button>
    </div>
    <div class="panel calc-panel" data-calc-panel="form">
        <div class="segmented blue">
            <button class="active" type="button" data-calc-type="severance">퇴직금</button>
            <button type="button" data-calc-type="annual">연차수당</button>
            <button type="button" data-calc-type="weekly">주휴수당</button>
            <button type="button" data-calc-type="minimum">최저임금 확인</button>
        </div>
        <form id="calcForm" class="stack-form" method="POST" action="?page=calculator">
            {% csrf_token %}
            <label data-salary-field>월 기본급 (원)<input name="salary" value="3500000"></label>
            <label data-months-field>근무 기간 (개월)<input name="months" value="14"></label>
            <label data-hours-field hidden>주 소정근로시간<input name="hours" value="40"></label>
            <div class="notice-box" data-minimum-box hidden>
                <strong>2026년 법정 최저임금</strong>
                <b>{{ minimum_wage }}원 / 시간</b>
            </div>
            <button class="full-button" type="submit">계산하기</button>
        </form>
        <div id="calcResult"></div>
    </div>
    <div class="panel calc-panel" data-calc-panel="chat" hidden>
        <div class="chat-window compact" id="calcMessages">
            <div class="message ai">자연어로 근로조건을 적어주세요. 예: 시급 11000원, 주 20시간 주휴수당</div>
        </div>
        <form class="composer textarea-composer" id="naturalCalcForm" method="POST" action="?page=calculator">
            {% csrf_token %}
            <textarea id="naturalCalcInput" rows="2" placeholder="예: 퇴직금 계산해줘, 3년 근무, 월 300만원">퇴직금 계산해줘, 3년 근무, 월 300만원</textarea>
            <button type="submit">전송</button>
        </form>
    </div>
</section>
