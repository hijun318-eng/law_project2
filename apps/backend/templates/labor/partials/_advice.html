<section class="content-narrow" data-advice-api="{% url 'advice_api' %}" data-initial-question="{{ initial_question }}">
    <h1>AI 노동법 상담</h1>
    <p class="lead">법령과 판례를 근거로 정확하게 답변해드립니다</p>
    <div class="quick-grid" data-quick-questions>
        {% for question in quick_questions %}
            <button type="button" data-question="{{ question }}">{{ question }}</button>
        {% endfor %}
    </div>
    <div class="chat-window" id="adviceMessages"></div>
    <form class="composer" id="adviceForm">
        {% csrf_token %}    
        <input id="adviceInput" placeholder="노동법 관련 질문을 입력하세요...">
        <button type="submit">전송</button>
    </form>
    <aside class="drawer" id="lawDrawer" hidden>
        <button class="drawer-backdrop" type="button" data-close-drawer></button>
        <div class="drawer-panel">
            <header><h2>관련 법령 원문</h2><button type="button" data-close-drawer>×</button></header>
            <article><strong>근로기준법 제34조</strong><p>사용자는 퇴직하는 근로자에게 급여를 지급하기 위하여 퇴직급여제도 중 하나 이상의 제도를 설정하여야 합니다.</p></article>
            <article><strong>근로자퇴직급여보장법 제8조</strong><p>계속근로기간 1년에 대하여 30일분 이상의 평균임금을 퇴직금으로 지급할 수 있는 제도를 설정해야 합니다.</p></article>
        </div>
    </aside>
</section>
