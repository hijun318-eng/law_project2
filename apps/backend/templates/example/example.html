{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Backend</title>
    <link rel="stylesheet" href="{% static 'example/css/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Django 모노레포 — Backend</h1>
            <p class="subtitle">법률 플랫폼 백엔드 서비스</p>
        </header>
        <main>
            <section class="card">
                <h2 id="greeting">환영합니다!</h2>
                <p>이 페이지는 Django 템플릿 + CSS + JS가 정상 작동함을 확인하기 위한 예제입니다.</p>
                <button id="clickBtn" class="btn">클릭해보세요</button>
                <p id="counterDisplay" class="counter">클릭 횟수: 0</p>
            </section>
            <section class="card">
                <h2>시스템 정보</h2>
                <ul id="infoList">
                    <li>Django 버전: 6.0.6</li>
                    <li>Python 버전: 3.13</li>
                    <li>모노레포 구조: law_project2</li>
                </ul>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Law Project. All rights reserved.</p>
        </footer>
    </div>
    <script src="{% static 'example/js/script.js' %}"></script>
</body>
</html>
